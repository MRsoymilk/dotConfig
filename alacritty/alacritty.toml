[window]
dimensions.columns = 100
dimensions.lines   = 40
padding.x = 0
padding.y = 0
decorations = "Full"
opacity = 0.95
startup_mode = "Windowed"

[font]
size = 10.0

normal.family    = "FantasqueSansM Nerd Font Mono"
normal.style     = "Regular"

bold.family      = "FantasqueSansM Nerd Font Mono"
bold.style       = "Bold"

italic.family    = "FantasqueSansM Nerd Font Propo"
italic.style     = "Italic"

[general]
live_config_reload = true

import = ["~/.config/alacritty/themes/blood-moon.toml"]
